name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/lfm-train

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: generic
            suffix: ""
          - target: fa2
            suffix: "-fa2"
          - target: generic-ssh
            suffix: "-ssh"
          - target: fa2-ssh
            suffix: "-ssh-fa2"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h /

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ${{ matrix.target }}
          load: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}${{ matrix.suffix }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.target }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.target }},mode=max,image-manifest=true

      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.ref_name }}${{ matrix.suffix }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - run: docker push ${{ env.IMAGE }}:${{ github.ref_name }}${{ matrix.suffix }}
